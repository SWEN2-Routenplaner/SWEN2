openapi: 3.0.3

info:
  title: Tour Planner API
  description: >
    Backend REST API for the Tour Planner application. Authentication is handled
    by Authentik (OIDC); this backend acts as an OAuth2 resource server — it
    validates the incoming JWT and trusts it. The user is identified by the `sub`
    claim of the token, which is stored as the owner of each tour and log. There
    is no local user management and no sharing between users.

    Conventions: send the Authentik JWT as `Authorization: Bearer <token>`;
    distance in km, time in seconds; difficulty/rating on a 1-5 scale; dates in
    ISO 8601.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Tours
  - name: Tour Logs
  - name: Search

security:
  - authentik: []

paths:

  # ----------------------------------------------------------------- Tours
  /api/tours:
    get:
      tags: [Tours]
      summary: List the current user's tours
      description: Optional `q` performs full-text search over tour fields and computed values.
      parameters:
        - { name: q, in: query, required: false, schema: { type: string } }
      responses:
        '200': { description: List of tours }
        '401': { description: Unauthorized }
    post:
      tags: [Tours]
      summary: Create a tour
      description: >
        Body (JSON): name, description, from, to, transportType
        (CAR/BIKE/WALK/HIKE/RUNNING). distance, estimatedTime and
        routeInformation are computed from OpenRouteService if omitted. Owner is
        taken from the token's `sub` claim.
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '201': { description: Tour created }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '502': { description: OpenRouteService request failed }

  /api/tours/{tourId}:
    parameters:
      - { name: tourId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Tours]
      summary: Get a tour by id
      responses:
        '200': { description: The requested tour }
        '401': { description: Unauthorized }
        '403': { description: Not your tour }
        '404': { description: Not found }
    put:
      tags: [Tours]
      summary: Update a tour
      description: "Body (JSON): same fields as create."
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '200': { description: Tour updated }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '403': { description: Not your tour }
        '404': { description: Not found }
    delete:
      tags: [Tours]
      summary: Delete a tour
      description: Also deletes the tour's logs.
      responses:
        '204': { description: Tour deleted }
        '401': { description: Unauthorized }
        '403': { description: Not your tour }
        '404': { description: Not found }

  /api/tours/route:
    post:
      tags: [Tours]
      summary: Compute a route preview
      description: >
        Proxies OpenRouteService to return distance, estimated time and route
        geometry without saving a tour. Body (JSON): from, to, transportType.
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '200': { description: "Computed route (distance, estimatedTime, routeInformation)" }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '502': { description: OpenRouteService request failed }

  /api/tours/{tourId}/image:
    parameters:
      - { name: tourId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Tours]
      summary: Get the tour image
      responses:
        '200': { description: The image binary }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    put:
      tags: [Tours]
      summary: Upload / replace the tour image
      description: "multipart/form-data with field `file`. Stored on the filesystem."
      requestBody:
        required: true
        content:
          multipart/form-data: {}
      responses:
        '200': { description: Updated tour }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '404': { description: Not found }
        '413': { description: File too large }
    delete:
      tags: [Tours]
      summary: Delete the tour image
      responses:
        '204': { description: Image deleted }
        '401': { description: Unauthorized }
        '404': { description: Not found }

  /api/tours/export:
    get:
      tags: [Tours]
      summary: Export tours
      description: Exports all tours (with logs) as a file. `format` = json (default) or csv.
      parameters:
        - { name: format, in: query, required: false, schema: { type: string, enum: [json, csv], default: json } }
      responses:
        '200': { description: Export file }
        '401': { description: Unauthorized }

  /api/tours/import:
    post:
      tags: [Tours]
      summary: Import tours
      description: "multipart/form-data with field `file` (a previously exported file)."
      requestBody:
        required: true
        content:
          multipart/form-data: {}
      responses:
        '200': { description: Import summary }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }

  # ------------------------------------------------------------- Tour Logs
  /api/tours/{tourId}/logs:
    parameters:
      - { name: tourId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Tour Logs]
      summary: List logs of a tour
      responses:
        '200': { description: List of tour logs }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    post:
      tags: [Tour Logs]
      summary: Create a tour log
      description: >
        Body (JSON): dateTime, comment, difficulty (1-5), totalDistance (km),
        totalTime (s), rating (1-5).
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '201': { description: Tour log created }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '404': { description: Not found }

  /api/tours/{tourId}/logs/{logId}:
    parameters:
      - { name: tourId, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: logId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Tour Logs]
      summary: Get a tour log
      responses:
        '200': { description: The requested tour log }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    put:
      tags: [Tour Logs]
      summary: Update a tour log
      description: "Body (JSON): same fields as create."
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '200': { description: Tour log updated }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    delete:
      tags: [Tour Logs]
      summary: Delete a tour log
      responses:
        '204': { description: Tour log deleted }
        '401': { description: Unauthorized }
        '404': { description: Not found }

  # ---------------------------------------------------------------- Search
  /api/search:
    get:
      tags: [Search]
      summary: Full-text search across tours and logs
      description: Searches tour fields, log fields and computed values. Returns matching tours and logs.
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: Search results (tours + logs) }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }

components:
  securitySchemes:
    authentik:
      type: openIdConnect
      # Replace with real URL
      openIdConnectUrl: https://opeIdConnectUrl