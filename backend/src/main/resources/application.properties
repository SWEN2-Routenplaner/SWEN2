spring.application.name=Tour Planner
spring.datasource.url=jdbc:postgresql://localhost:5432/tourplanner
spring.datasource.username=tourplanner
spring.datasource.password=LVfkSrV5wBDqlpENm4iTCK0RC+Sg7XdG
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Authentik OIDC Configuration
spring.security.oauth2.client.registration.authentik.client-id=tour-planner
spring.security.oauth2.client.registration.authentik.client-secret=testsecret
spring.security.oauth2.client.registration.authentik.scope=openid,profile,email
spring.security.oauth2.client.registration.authentik.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.authentik.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.authentik.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Provider Configuration - Manual URIs with trailing slashes
spring.security.oauth2.client.provider.authentik.issuer-uri=http://localhost:8000/application/o/tour-planner/
spring.security.oauth2.client.provider.authentik.authorization-uri=http://localhost:8000/application/o/authorize/
spring.security.oauth2.client.provider.authentik.token-uri=http://localhost:8000/application/o/token/
spring.security.oauth2.client.provider.authentik.user-info-uri=http://localhost:8000/application/o/userinfo/
spring.security.oauth2.client.provider.authentik.jwk-set-uri=http://localhost:8000/application/o/tour-planner/jwks/
spring.security.oauth2.client.provider.authentik.user-name-attribute=preferred_username

# Logging & Session Fixes
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.web.client=DEBUG
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=false

# OpenRouteService Configuration
openrouteservice.base-url=https://api.openrouteservice.org
