<div class="new-tour">
  <div class="field">
    <label>From</label>
    <input type="text" placeholder="Start location" />
  </div>

  <div class="field">
    <label>To</label>
    <input type="text" placeholder="End location" />
  </div>

  <div class="actions-row">
    <div class="transport-buttons">
      <button class="btn-icon" title="Add waypoint">
        <!-- Plus icon -->
        <img src="icons/plus.png" alt="" height="18" width="18" />
      </button>

      <button class="btn-icon" title="Bike"
              (click)="toggleTransportMode('bike')"
              [class.active]="selectedMode() === 'bike'">
        <!-- Bike icon -->
        <img src="icons/bicycle.png" alt="" height="18" width="18"/>
      </button>

      <button class="btn-icon" title="Car"
              (click)="toggleTransportMode('car')"
              [class.active]="selectedMode() === 'car'">
        <!-- Car icon -->
        <img src="icons/car.png" alt="" height="18" width="18"/>
      </button>

      <button class="btn-icon" title="Walking"
              (click)="toggleTransportMode('walk')"
              [class.active]="selectedMode() === 'walk'">
        <!-- Walking icon -->
          <img src="icons/walker.png" alt="" height="18" width="18"/>
      </button>
    </div>

    <button class="btn-expand" (click)="toggleExpanded()" [title]="expanded() ? 'Collapse' : 'Expand'">
      <!-- Expand icon -->
      <img src ="icons/down.png" alt="" height="18" width="18" />
    </button>
  </div>

  @if (expanded()) {
    <div class="extra-fields">
      <div class="field">
        <label>Tour Name</label>
        <input type="text" placeholder="Enter tour name" />
      </div>
      <div class="field">
        <label>Tour Description</label>
        <textarea rows="3" placeholder="Enter tour description"></textarea>
      </div>
    </div>
  }
</div>
