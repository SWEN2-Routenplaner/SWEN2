<div class="tours-layout">

  <mat-card class="tours-sidebar desktop-only">
    <div class="sidebar-header">
      @if (!isDefaultRoute()) {
        <button class="btn-back" (click)="goBack()" title="Back">
          <mat-icon>arrow_back</mat-icon>
        </button>
      }
      <h2 class="sidebar-title">{{ getSidebarTitle() }}</h2>
      @if (isDefaultRoute()) {
        <button class="btn-add-tour" routerLink="/create" title="Create new tour" aria-label="Create new tour">
          <mat-icon>add</mat-icon>
        </button>
      }
    </div>

    <div class="sidebar-scroll-container">
      <router-outlet></router-outlet>
    </div>
  </mat-card>

  <div class="map">
    <!-- Map -->
    <map></map>
  </div>

</div>

<ion-modal
  class="mobile-only"
  [isOpen]="isModalOpen()"
  [breakpoints]="breakpoints"
  [initialBreakpoint]="initialBreakpoint"
  [handle]="false"
  [expandToScroll]="false"
  [showBackdrop]="false"
  [backdropDismiss]="false"
  [canDismiss]="false"
  [focusTrap]="false"
  (ionModalDidDismiss)="handleModalDismiss()"
>
  <ng-template>
    <!-- Custom Drag handle (clickable) -->
    <div (click)="toggleBreakpoint()" class="custom-drag-handle">
      <div class="custom-handle-pill"></div>
    </div>
    
    <!-- Mobile header -->
    <div class="sidebar-header">
      @if (!isDefaultRoute()) {
        <button class="btn-back" (click)="goBack()" title="Back">
          <mat-icon>arrow_back</mat-icon>
        </button>
      }
      <h2 class="sidebar-title">{{ getSidebarTitle() }}</h2>
      @if (isDefaultRoute()) {
        <button class="btn-add-tour" routerLink="/create" title="Create new tour" aria-label="Create new tour">
          <mat-icon>add</mat-icon>
        </button>
      }
    </div>

    <ion-content>
      <div class="router-wrapper">
        <router-outlet></router-outlet>
      </div>

    </ion-content>
  </ng-template>
</ion-modal>
