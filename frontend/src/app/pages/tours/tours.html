<div class="tours-layout">

  <mat-card class="tours-sidebar desktop-only">
    <div class="sidebar-scroll-container">
      <router-outlet></router-outlet>
    </div>
  </mat-card>

  <div class="map">
    <!-- Map -->
    <map></map>
  </div>

</div>

<ion-modal
  [isOpen]="isModalOpen()"
  [breakpoints]="breakpoints"
  [initialBreakpoint]="initialBreakpoint"
  [handle]="true"
  [expandToScroll]="false"
  [showBackdrop]="false"
  [backdropDismiss]="false"
  [canDismiss]="false"
  [focusTrap]="false"
  (ionModalDidDismiss)="handleModalDismiss()"
>
  <ng-template>
    <div (click)="toggleBreakpoint()" style="height: 16px; background: white; flex-shrink: 0; border-radius: 25px 25px 0 0; cursor: pointer;"></div>
    <ion-content>
      <div class="router-wrapper">
        <router-outlet></router-outlet>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
